<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic UML Diagram Viewer</title>
    <!-- Outfit Font for Modern Premium Aesthetics -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0b0f19 0%, #111827 50%, #1e1b4b 100%);
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.15);
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5b4fc 0%, #6366f1 50%, #4f46e5 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
        }

        .toolbar {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
        }

        .btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .btn-upload {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-upload:hover {
            background: #4f46e5;
            border-color: #4f46e5;
        }

        .source-indicator {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: -30px;
            margin-bottom: 40px;
        }

        .source-indicator span {
            color: var(--success);
            font-weight: 600;
        }

        .diagrams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(650px, 1fr));
            gap: 32px;
        }

        @media (max-width: 768px) {
            .diagrams-grid {
                grid-template-columns: 1fr;
            }
        }

        .diagram-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(16px);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1), 
                        border-color 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .diagram-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 0 0 20px rgba(99, 102, 241, 0.1);
            border-color: rgba(99, 102, 241, 0.4);
        }

        .diagram-card h2 {
            font-size: 1.4rem;
            font-weight: 600;
            color: #f8fafc;
            margin-bottom: 6px;
        }

        .diagram-type {
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 24px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.04);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .mermaid-container {
            background: rgba(15, 23, 42, 0.5);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            min-height: 380px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            overflow-x: auto;
        }

        .mermaid {
            width: 100%;
            display: flex;
            justify-content: center;
        }

        /* Customize Mermaid Theme for Dark Mode Compatibility */
        .mermaid svg {
            max-width: 100%;
            height: auto;
        }

        .code-details {
            margin-top: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            overflow: hidden;
            background: rgba(15, 23, 42, 0.3);
        }

        .code-details summary {
            padding: 12px;
            font-size: 0.85rem;
            color: var(--text-secondary);
            cursor: pointer;
            user-select: none;
            font-weight: 500;
            transition: background 0.2s;
        }

        .code-details summary:hover {
            background: rgba(255, 255, 255, 0.02);
            color: var(--text-primary);
        }

        .code-details textarea {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border: none;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            color: #38bdf8;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            padding: 12px;
            resize: vertical;
            outline: none;
        }

        .card-actions {
            margin-top: 16px;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .action-link {
            font-size: 0.85rem;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .action-link:hover {
            color: #818cf8;
            text-decoration: underline;
        }

        .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            background: rgba(30, 41, 59, 0.3);
            border: 2px dashed rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            margin-top: 60px;
            padding-top: 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 id="system-title">📊 Dynamic Diagram Viewer</h1>
            <p id="diagram-count-text">Loading comprehensive diagrams...</p>
        </header>

        <div class="toolbar">
            <button id="btn-refresh" class="btn">🔄 Fetch Latest API Run</button>
            <label for="file-upload" class="btn btn-upload">📁 Load Output JSON File</label>
            <input type="file" id="file-upload" accept=".json" style="display:none;" />
        </div>

        <div class="source-indicator" id="source-indicator">
            Showing fallback template: <span>College Event Management Website</span>
        </div>

        <div class="diagrams-grid" id="diagrams-grid">
            <!-- Dynamically populated diagrams -->
        </div>

        <footer>
            <p>Generated by Agent 2 (FastAPI Diagram Generator) • Powered by Gemini AI</p>
        </footer>
    </div>

    <script>
        // Fallback default templates if server/upload is not available
        const defaultDiagrams = {
            "system_name": "College Event Management Website",
            "diagrams": [
                {
                    "title": "Use Case Diagram",
                    "type": "flowchart",
                    "mermaid": "graph TB\n    A1[\"👤 A1: Student\"]\n    A2[\"👤 A2: Organizer\"]\n    \n    UC1[\"UC1: View Events\"]\n    UC2[\"UC2: Register<br/>for Event\"]\n    UC3[\"UC3: Sign Up\"]\n    UC4[\"UC4: Log In\"]\n    UC5[\"UC5: View<br/>Registrations\"]\n    UC6[\"UC6: Manage<br/>Events\"]\n    UC7[\"UC7: View Statistics\"]\n    UC8[\"UC8: Process<br/>Payment\"]\n    UC9[\"UC9: Export<br/>Data\"]\n    \n    A1 --> UC1\n    A1 --> UC2\n    A1 --> UC3\n    A1 --> UC4\n    A1 --> UC5\n    A1 --> UC8\n    \n    A2 --> UC4\n    A2 --> UC6\n    A2 --> UC7\n    A2 --> UC9\n    \n    UC2 --> UC8\n    UC6 --> UC4\n    UC7 --> UC4\n    UC9 --> UC4"
                },
                {
                    "title": "Student Journey Flowchart",
                    "type": "flowchart",
                    "mermaid": "flowchart TD\n    Start([\"Student Visits Website\"]) --> SignupCheck{\"Has Account?\"}\n    SignupCheck -->|No| SignUp[\"UC3: Sign Up<br/>FR-4: Use College Email\"]\n    SignUp --> LogIn[\"UC4: Log In<br/>FR-5: Authenticate\"]\n    SignupCheck -->|Yes| LogIn\n    LogIn --> ViewEvents[\"UC1: View Events<br/>FR-1: Browse Upcoming Events\"]\n    ViewEvents --> SelectEvent{\"Event Found?\"}\n    SelectEvent -->|No| ViewEvents\n    SelectEvent -->|Yes| Register[\"UC2: Register for Event<br/>FR-2, FR-12: Collect Name, Email, etc.\"]\n    Register --> PaidEvent{\"Paid Event?\"}\n    PaidEvent -->|No| ConfirmEmail[\"FR-3: Send Confirmation<br/>Email to Student\"]\n    PaidEvent -->|Yes| Payment[\"UC8: Process Payment<br/>FR-13: Razorpay Integration\"]\n    Payment --> PaymentCheck{\"Payment<br/>Successful?\"}\n    PaymentCheck -->|No| PaymentFailed[\"Payment Failed\"]\n    PaymentFailed --> Register\n    PaymentCheck -->|Yes| Ticket[\"FR-14: Generate PDF<br/>Ticket with QR Code\"]\n    Ticket --> ConfirmEmail\n    ConfirmEmail --> ViewReg[\"UC5: View Registrations<br/>FR-6: See Past/Upcoming Events\"]\n    ViewReg --> End([\"Registration Complete\"])"
                },
                {
                    "title": "Organizer Workflow",
                    "type": "flowchart",
                    "mermaid": "flowchart TD\n    Start([\"Organizer Logs In\"]) --> Auth[\"UC4: Log In<br/>FR-5: Authenticate\"]\n    Auth --> Dashboard[\"FR-7: Admin Dashboard\"]\n    Dashboard --> Action{\"Select Action\"}\n    \n    Action -->|Manage| Create[\"UC6: Manage Events\"]\n    Create --> CreateSub{\"Operation\"}\n    CreateSub -->|Create| CreateE[\"FR-8: Create<br/>New Event\"]\n    CreateSub -->|Edit| EditE[\"FR-9: Edit<br/>Existing Event\"]\n    CreateSub -->|Delete| DeleteE[\"FR-10: Delete<br/>Event\"]\n    CreateE --> Dashboard\n    EditE --> Dashboard\n    DeleteE --> Dashboard\n    \n    Action -->|Monitor| Stats[\"UC7: View Stats<br/>FR-11: Display Registration<br/>Analytics\"]\n    Stats --> Dashboard\n    \n    Action -->|Export| Export[\"UC9: Export Data<br/>FR-15: CSV Format\"]\n    Export --> Download[\"Participant List<br/>Downloaded\"]\n    Download --> Dashboard"
                },
                {
                    "title": "Payment Processing Sequence",
                    "type": "flowchart",
                    "mermaid": "flowchart LR\n    Student[\"Student\"] -->|Initiates Payment| Register[\"Registration<br/>System\"]\n    Register -->|FR-13: Integration| RazorPay[\"Razorpay<br/>Gateway\"]\n    RazorPay -->|Process Payment| Bank[\"Bank\"]\n    Bank -->|Success/Fail| RazorPay\n    RazorPay -->|Status| Register\n    Register -->|Payment Success| Ticket[\"UC8: Process Payment<br/>Generate Ticket\"]\n    Ticket -->|FR-14: Generate PDF<br/>with QR Code| PDF[\"PDF Ticket\"]\n    PDF -->|Deliver| Student\n    Register -->|Payment Fail| Retry[\"Retry Payment\"]\n    Retry -->|Re-initiate| Register"
                },
                {
                    "title": "System State Machine",
                    "type": "state",
                    "mermaid": "stateDiagram-v2\n    [*] --> NotAuthenticated: Start\n    \n    NotAuthenticated --> AccountCreated: UC3: Sign Up\n    AccountCreated --> Authenticated: UC4: Log In\n    NotAuthenticated --> Authenticated: UC4: Log In\n    \n    Authenticated --> BrowsingEvents: UC1: View Events\n    BrowsingEvents --> BrowsingEvents: Browse Multiple Events\n    BrowsingEvents --> EventSelected: Select Event\n    Authenticated --> ViewMyReg: UC5: View Registrations\n    ViewMyReg --> BrowsingEvents\n    \n    EventSelected --> RegistrationForm: UC2: Register for Event\n    RegistrationForm --> DataCollection: FR-12: Collect Info\n    DataCollection --> CheckPayment: Is Paid Event?\n    \n    CheckPayment --> FreeEvent: No Payment Required\n    FreeEvent --> SendConfirm: FR-3: Send Confirmation\n    \n    CheckPayment --> ProcessPayment: UC8: Process Payment\n    ProcessPayment --> PaymentPending: FR-13: Razorpay Integration\n    PaymentPending --> PaymentSuccess: Payment Approved\n    PaymentPending --> PaymentFailed: Payment Rejected\n    PaymentFailed --> ProcessPayment: Retry Payment\n    \n    PaymentSuccess --> GenerateTicket: FR-14: Generate PDF<br/>with QR Code\n    GenerateTicket --> SendConfirm\n    SendConfirm --> Registered: Registration Complete\n    Registered --> [*]: End"
                },
                {
                    "title": "Functional Requirements Traceability Map",
                    "type": "flowchart",
                    "mermaid": "flowchart TB\n    FR1[\"FR-1: View Events\"] --> UC1[\"UC1\"]\n    FR2[\"FR-2: Register\"] --> UC2[\"UC2\"]\n    FR3[\"FR-3: Confirmation<br/>Email\"] --> UC2\n    FR4[\"FR-4: Sign Up<br/>College Email\"] --> UC3[\"UC3\"]\n    FR5[\"FR-5: Log In\"] --> UC4[\"UC4\"]\n    FR6[\"FR-6: View<br/>Registrations\"] --> UC5[\"UC5\"]\n    FR7[\"FR-7: Admin<br/>Dashboard\"] --> UC6[\"UC6\"]\n    FR8[\"FR-8: Create<br/>Events\"] --> UC6\n    FR9[\"FR-9: Edit<br/>Events\"] --> UC6\n    FR10[\"FR-10: Delete<br/>Events\"] --> UC6\n    FR11[\"FR-11: Statistics\"] --> UC7[\"UC7\"]\n    FR12[\"FR-12: Collect<br/>Data\"] --> UC2\n    FR13[\"FR-13: Payment<br/>Gateway\"] --> UC8[\"UC8\"]\n    FR14[\"FR-14: Generate<br/>Ticket\"] --> UC8\n    FR15[\"FR-15: Export<br/>CSV\"] --> UC9[\"UC9\"]\n    FR16[\"FR-16: Email<br/>Reminders\"] --> UC2\n    \n    UC1 --> System[\"College Event<br/>Management System\"]\n    UC2 --> System\n    UC3 --> System\n    UC4 --> System\n    UC5 --> System\n    UC6 --> System\n    UC7 --> System\n    UC8 --> System\n    UC9 --> System"
                }
            ]
        };

        // Initialize Mermaid in dark mode
        mermaid.initialize({ 
            startOnLoad: false, 
            theme: 'dark',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: true, htmlLabels: true }
        });

        // Dynamic base64 generator for sharing links
        function getMermaidInkUrl(code) {
            try {
                const encoded = btoa(unescape(encodeURIComponent(code)));
                return `https://mermaid.ink/img/${encoded}`;
            } catch(e) {
                return '';
            }
        }

        // Core render function
        async function renderDiagrams(data, sourceLabel = "Uploaded File") {
            const grid = document.getElementById('diagrams-grid');
            grid.innerHTML = '';
            
            const systemName = data.system_name || 'System Diagrams';
            document.getElementById('system-title').textContent = '📊 ' + systemName;
            document.getElementById('source-indicator').innerHTML = `Showing source: <span>${sourceLabel}</span>`;
            
            let diagrams = [];
            if (data.data && data.data.generated_diagrams) {
                diagrams = data.data.generated_diagrams;
            } else if (data.diagrams) {
                diagrams = data.diagrams;
            } else if (Array.isArray(data)) {
                diagrams = data;
            }
            
            document.getElementById('diagram-count-text').textContent = `${diagrams.length} Comprehensive Diagrams`;
            
            if (diagrams.length === 0) {
                grid.innerHTML = '<div class="no-data">No diagrams found in this dataset.</div>';
                return;
            }
            
            diagrams.forEach((d, i) => {
                const title = d.title || `Diagram ${i + 1}`;
                const type = d.type || 'flowchart';
                const code = d.mermaid || '';
                const imgUrl = d.image_url || getMermaidInkUrl(code);
                
                const card = document.createElement('div');
                card.className = 'diagram-card';
                
                let shareHtml = '';
                if (imgUrl) {
                    shareHtml = `<a href="${imgUrl}" target="_blank" class="action-link">🔗 Open image link (mermaid.ink)</a>`;
                }
                
                card.innerHTML = `
                    <h2>${i + 1}️⃣ ${title}</h2>
                    <div><span class="diagram-type">${type}</span></div>
                    <div class="mermaid-container">
                        <pre class="mermaid">${code}</pre>
                    </div>
                    <details class="code-details">
                        <summary>View raw Mermaid code</summary>
                        <textarea readonly>${code}</textarea>
                    </details>
                    <div class="card-actions">
                        ${shareHtml}
                    </div>
                `;
                grid.appendChild(card);
            });
            
            // Trigger Mermaid compilation on the added elements
            try {
                await mermaid.run();
            } catch(e) {
                console.error("Mermaid execution error: ", e);
            }
        }

        // File Uploader Event Handler
        document.getElementById('file-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = JSON.parse(evt.target.result);
                    renderDiagrams(data, `File: ${file.name}`);
                } catch(err) {
                    alert('Error parsing diagram output JSON: ' + err.message);
                }
            };
            reader.readAsText(file);
        });

        // API Refresh Fetcher
        async function fetchLatest() {
            try {
                const response = await fetch('http://localhost:8000/diagrams/latest');
                if (response.ok) {
                    const data = await response.json();
                    renderDiagrams(data, "Live API Backend (/diagrams/latest)");
                    return true;
                }
            } catch(err) {
                console.warn('API backend not reached. Using default template.');
            }
            return false;
        }

        // Refresh Button Event Handler
        document.getElementById('btn-refresh').addEventListener('click', async () => {
            const success = await fetchLatest();
            if (!success) {
                alert('FastAPI server is not running on http://localhost:8000 or no diagrams are generated yet. Using default templates instead.');
            }
        });

        // Load routine
        window.addEventListener('DOMContentLoaded', async () => {
            // First try to load from API backend, otherwise fallback to local defaults
            const loadedFromApi = await fetchLatest();
            if (!loadedFromApi) {
                renderDiagrams(defaultDiagrams, "Default Template");
            }
        });
    </script>
</body>
</html>
